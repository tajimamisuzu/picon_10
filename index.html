<title>picon song — 10th Anniversary</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #fff; overflow: hidden; }
  #stage { width: 100vw; height: 100vh; position: relative; }
  img.scene {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover; object-position: center;
    display: block; pointer-events: none;
  }
  #img-pc { display: block; }
  #img-sp { display: none; }
  @media (max-width: 600px) {
    #img-pc { display: none; }
    #img-sp { display: block; }
  }
  #tap-zone {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 18%; height: 22%;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    z-index: 10;
  }
  @media (max-width: 600px) {
    #tap-zone { width: 28%; height: 16%; top: 48%; }
  }
  @keyframes float-shake {
    0%   { transform: translate(0px, 0px) rotate(0deg); }
    15%  { transform: translate(-1.5px, -1px) rotate(-0.3deg); }
    30%  { transform: translate(1px, 1.5px) rotate(0.2deg); }
    45%  { transform: translate(-1px, 0.5px) rotate(-0.2deg); }
    60%  { transform: translate(1.5px, -1px) rotate(0.3deg); }
    75%  { transform: translate(-0.5px, 1px) rotate(-0.1deg); }
    90%  { transform: translate(1px, -0.5px) rotate(0.2deg); }
    100% { transform: translate(0px, 0px) rotate(0deg); }
  }
  #stage.playing { animation: float-shake 0.9s ease-in-out infinite; transform-origin: center center; }
  .ripple {
    position: fixed; border-radius: 50%;
    transform: scale(0); background: rgba(100,160,255,0.2);
    pointer-events: none; animation: ripple-anim 0.7s ease-out forwards;
  }
  @keyframes ripple-anim { to { transform: scale(5); opacity: 0; } }
</style>

<script>
const stage = document.getElementById('stage');
const tapZone = document.getElementById('tap-zone');
const audio = document.getElementById('audio');
tapZone.addEventListener('click', function(e) {
  const ripple = document.createElement('span');
  ripple.className = 'ripple';
  const size = 160;
  ripple.style.cssText = 'width:'+size+'px;height:'+size+'px;left:'+(e.clientX-size/2)+'px;top:'+(e.clientY-size/2)+'px;';
  document.body.appendChild(ripple);
  setTimeout(() => ripple.remove(), 800);
  if (audio.paused) { audio.play(); stage.classList.add('playing'); }
  else { audio.pause(); audio.currentTime = 0; stage.classList.remove('playing'); }
});
audio.addEventListener('ended', () => stage.classList.remove('playing'));
</script>
